<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClarityVision – AI Medical Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e1b4b, #1e3a8a);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 650px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      text-align: center;
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .highlight {
      color: #38bdf8;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.6;
      margin-top: 10px;
      opacity: 0.85;
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 14px 26px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      background: #38bdf8;
      color: #0f172a;
      transition: 0.25s ease-in-out;
      box-shadow: 0 4px 15px rgba(56,189,248,0.4);
    }

    .btn:hover {
      background: #0ea5e9;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(56,189,248,0.55);
    }

    footer {
      margin-top: 25px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

</head>
<body>
  <div class="container">
    <h1>Welcome to <span class="highlight">ClarityVision</span></h1>

    <p>
      Your AI-powered platform for medical text extraction, translation, and cancer prediction.
      Experience fast, secure, and intelligent healthcare support.
    </p>

    <div class="buttons">
      <a href="/ocr" class="btn">📝 OCR & Translation</a>
      <a href="/predict" class="btn">🔬 Cancer Prediction</a>
    </div>

    <footer>
      © 2025 ClarityVision — AI for Smarter Healthcare
    </footer>
  </div>
</body>
</html>
