<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css">
  <title>📝 OCR & Translation – ClarityVision</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }
    nav {
      background: #2c3e50;
      padding: 1rem 2rem;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 1.5rem;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    h2 {
      color: #2c3e50;
      margin-bottom: 1rem;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 1rem;
    }
    input, select, button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      margin-top: 1.5rem;
      transition: 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 1.5rem;
      background: #eef6ff;
      padding: 1rem;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<nav>
  <div><strong>ClarityVision</strong></div>
  <div>
    <a href="/">OCR & Translation</a>
    <a href="/predict">Cancer Prediction</a>
  </div>
</nav>

<div class="container">
  <h2>📄 OCR & Translate from Image or PDF</h2>
  <form id="ocrForm" enctype="multipart/form-data">
    <label>Select Image or PDF:</label>
    <input type="file" name="image" accept="image/*,application/pdf" required>

    <label>Select Target Language:</label>
    <select name="language" id="languageSelect">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="zh">Chinese</option>
      <option value="ar">Arabic</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
    </select>

    <button type="submit">Extract & Translate</button>
  </form>

  <div id="ocrResult" class="result" style="display: none;"></div>
</div>

<script>
  document.getElementById("ocrForm").onsubmit = async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const res = await fetch("/ocr", { method: "POST", body: form });
    const data = await res.json();

    const output = `
📝 Extracted Text:
${data.extracted_text || "N/A"}

🌍 Translated Text [${data.target_language || "N/A"}]:
${data.translated_text || "N/A"}

🔬 Named Entities:
${data.entities.map(e => e.text + " [" + e.label + "]").join(", ") || "None"}
    `;
    const resultBox = document.getElementById("ocrResult");
    resultBox.style.display = "block";
    resultBox.innerText = output;
  };
</script>

</body>
</html>
